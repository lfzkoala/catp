name: CI
on: [push, pull_request]

jobs:
  solidity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - run: cd catp-contracts && forge build
      - run: cd catp-contracts && forge test

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: catp-sdk
        run: NODE_ENV=development pnpm install
      - name: Type check
        working-directory: catp-sdk
        run: pnpm tsc --noEmit
      - name: Run tests
        working-directory: catp-sdk
        run: pnpm test

  catp-plugin:
    name: catp-plugin (type-check + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --include=dev
      - name: Type check
        working-directory: catp-plugin
        run: npm run typecheck
      - name: Run tests with coverage
        working-directory: catp-plugin
        run: npm run test:coverage
