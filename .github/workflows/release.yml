name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish @catp-protocol/cli to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Type check
        working-directory: catp-plugin
        run: npm run typecheck

      - name: Run tests
        working-directory: catp-plugin
        run: npm test

      - name: Build
        working-directory: catp-plugin
        run: npm run build

      - name: Check release version
        id: release-version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./catp-plugin/package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match catp-plugin/package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          if npm view "@catp-protocol/cli@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@catp-protocol/cli@$PACKAGE_VERSION is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "@catp-protocol/cli@$PACKAGE_VERSION is not published yet; publishing from this workflow."
          fi

      - name: Publish
        if: steps.release-version.outputs.published != 'true'
        working-directory: catp-plugin
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
